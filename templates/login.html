<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WifiMaxx Operações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #0b1220 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 400px;
            width: 100%;
            margin: 20px;
        }
        
        .login-header {
            background: linear-gradient(135deg, #0f172a 0%, #131d33 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 2rem;
            text-align: center;
        }
        
        .login-body {
            padding: 2rem;
        }
        
        .form-control {
            border-radius: 15px;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #e9ecef;
            transition: all 0.3s ease;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .form-control:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 0.2rem rgba(26, 35, 126, 0.25);
            background: rgba(255, 255, 255, 0.08);
            color: #e9ecef;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            border: none;
            border-radius: 15px;
            padding: 0.75rem 2rem;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 35, 126, 0.4);
            color: white;
        }
        
        .btn-login:disabled {
            opacity: 0.8;
            transform: none;
            cursor: not-allowed;
        }
        
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
        }
        
        .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .logo-image {
            max-width: 150px;
            max-height: 100px;
            margin-bottom: 1rem;
            object-fit: contain;
            /* Removido o filtro que pode estar causando problemas */
        }
        
        @media (max-width: 576px) {
            .logo-image {
                max-width: 120px;
                max-height: 80px;
            }
        }
        
        .alert {
            border-radius: 15px;
            border: none;
        }
        
        .form-floating {
            margin-bottom: 1rem;
        }
        
        .form-floating > .form-control {
            padding: 1rem 0.75rem;
        }
        
        .form-floating > label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }
        
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: rgba(255, 255, 255, 0.6);
            background: transparent;
            padding: 0 4px;
        }

        .form-floating > .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e9ecef;
        }

        .form-floating > .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }
        
        @media (max-width: 576px) {
            .login-card {
                margin: 10px;
                border-radius: 15px;
            }
            
            .login-header {
                border-radius: 15px 15px 0 0;
                padding: 1.5rem;
            }
            
            .login-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="/static/logo.png" alt="WifiMaxx Logo" class="logo-image" 
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <i class="bi bi-wifi logo-icon" style="display: none;"></i>
            <h2 class="mb-0">OPERAÇÕES</h2>
            <p class="mb-0 opacity-75">Sistema de Monitoramento</p>
        </div>
        
        <div class="login-body">
            {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {{ error }}
            </div>
            {% endif %}
            
            <form method="post" action="/login" id="loginForm">
                <!-- Campo hidden para URL de redirecionamento após login -->
                <input type="hidden" name="next_url" id="next_url" value="{{ next_url or '/dashboard' }}">
                
                <div class="form-floating">
                    <input type="email" class="form-control" id="username" name="username" placeholder="E-mail" required>
                    <label for="username">
                        <i class="bi bi-envelope me-2"></i>E-mail
                    </label>
                </div>
                
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                    <label for="password">
                        <i class="bi bi-lock me-2"></i>Senha
                    </label>
                </div>
                
                <div class="form-check mb-3 text-start">
                    <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.9rem;">
                        <i class="bi bi-person-check me-1"></i>Lembrar meu login
                    </label>
                </div>
                
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <span id="loginText">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Entrar
                    </span>
                    <span id="loginSpinner" style="display: none;">
                        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                        Entrando...
                    </span>
                </button>
            </form>
            
            <!-- Botão de Download do App (visível apenas em mobile Android) -->
            <div id="appDownloadButton" class="mt-3" style="display: none;">
                <hr class="my-3">
                <div class="text-center">
                    <p class="text-muted mb-2">
                        <i class="bi bi-phone me-1"></i>
                        Prefere usar o aplicativo?
                    </p>
                    <a href="/download-app" 
                       class="btn btn-success btn-lg w-100" 
                       id="downloadAppLink">
                        <i class="bi bi-android2 me-2"></i>
                        Baixar App Android
                        <small class="d-block" style="font-size: 0.7rem; opacity: 0.8;">versão mais recente</small>
                    </a>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <small class="text-muted">
                    <i class="bi bi-shield-check me-1"></i>
                    Acesso seguro e criptografado
                </small>
                <br>
                <small class="text-muted mt-2 d-block">
                    Problemas de login? 
                    <a href="/clear-cookies" class="text-decoration-none text-muted">
                        <i class="bi bi-arrow-clockwise me-1"></i>Limpar cache
                    </a>
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-focus no campo de usuário
        document.getElementById('username').focus();
        
        // Enter key navigation
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });
        
        // =====================================================
        // Carregar credenciais salvas (Lembrar-me)
        // =====================================================
        function loadSavedCredentials() {
            const savedUsername = localStorage.getItem('savedUsername');
            const savedPassword = localStorage.getItem('savedPassword');
            const rememberMe = localStorage.getItem('rememberMe');
            
            if (rememberMe === 'true' && savedUsername && savedPassword) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('password').value = atob(savedPassword); // Decode
                document.getElementById('rememberMe').checked = true;
                console.log('🔐 Credenciais carregadas do localStorage');
            }
        }
        
        // Carregar credenciais ao iniciar
        document.addEventListener('DOMContentLoaded', loadSavedCredentials);
        
        // AJAX Login com suporte a primeiro acesso
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent default form submission
            
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                showAlert('Por favor, preencha todos os campos.', 'warning');
                return;
            }
            
            // Salvar credenciais apenas se checkbox marcado
            // Será feito após login bem-sucedido para evitar salvar dados incorretos
            
            // Mostrar loading
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                
                // Incluir URL de redirecionamento (next_url)
                const nextUrl = document.getElementById('next_url').value;
                if (nextUrl) {
                    formData.append('next_url', nextUrl);
                }
                
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include',  // Importante para cookies em mobile
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // =====================================================
                    // Salvar credenciais ANTES de limpar cache (se checkbox marcado)
                    // =====================================================
                    if (rememberMe) {
                        localStorage.setItem('savedUsername', username);
                        localStorage.setItem('savedPassword', btoa(password)); // Encode simples
                        localStorage.setItem('rememberMe', 'true');
                        console.log('🔐 Credenciais salvas no localStorage');
                    } else {
                        localStorage.removeItem('savedUsername');
                        localStorage.removeItem('savedPassword');
                        localStorage.removeItem('rememberMe');
                    }
                    
                    // Limpar cache (exceto credenciais salvas)
                    try {
                        await clearUserCache();
                    } catch (cacheError) {
                        console.warn('Erro ao limpar cache:', cacheError);
                        // Continue mesmo se a limpeza de cache falhar
                    }
                    
                    if (result.first_login) {
                        // Primeiro acesso - redirecionar para mudança de senha
                        showAlert(result.message, 'info');
                        setTimeout(() => {
                            window.location.href = `/first-login?username=${encodeURIComponent(username)}`;
                        }, 1500);
                    } else {
                        // Login normal - redirecionar para dashboard
                        showAlert('Login realizado com sucesso!', 'success');
                        setTimeout(() => {
                            const targetUrl = result.redirect || '/dashboard';
                            
                            // 🔄 Se reload forçado foi solicitado, adicionar parâmetro para forçar refresh
                            if (window.forcePageReloadAfterLogin || sessionStorage.getItem('forceReloadRequired')) {
                                console.log('🔄 Aplicando reload forçado após login de usuário diferente');
                                sessionStorage.removeItem('forceReloadRequired');
                                
                                // Adicionar timestamp para forçar reload completo
                                const separator = targetUrl.includes('?') ? '&' : '?';
                                window.location.href = `${targetUrl}${separator}_reload=${Date.now()}`;
                            } else {
                                window.location.href = targetUrl;
                            }
                        }, 1000);
                    }
                } else {
                    showAlert(result.message || 'Erro no login', 'danger');
                }
                
            } catch (error) {
                console.error('Erro no login:', error);
                showAlert('Erro de conexão. Tente novamente.', 'danger');
            } finally {
                // Restaurar botão
                loginBtn.disabled = false;
                loginText.style.display = 'inline-block';
                loginSpinner.style.display = 'none';
            }
        });
        
        // Função para limpeza completa de cache durante login
        // IMPORTANTE: Preserva credenciais salvas (rememberMe)
        async function clearUserCache() {
            try {
                // Salvar credenciais ANTES de limpar
                const savedUsername = localStorage.getItem('savedUsername');
                const savedPassword = localStorage.getItem('savedPassword');
                const rememberMeValue = localStorage.getItem('rememberMe');
                
                // Limpar storage local do navegador
                sessionStorage.clear();
                localStorage.clear();
                
                // Restaurar credenciais se existiam
                if (rememberMeValue === 'true' && savedUsername && savedPassword) {
                    localStorage.setItem('savedUsername', savedUsername);
                    localStorage.setItem('savedPassword', savedPassword);
                    localStorage.setItem('rememberMe', rememberMeValue);
                    console.log('🔐 Credenciais preservadas após limpeza de cache');
                }
                
                // Limpar variáveis globais comuns (caso existam)
                if (window.currentData) window.currentData = [];
                if (window.filteredData) window.filteredData = [];
                if (window.equipmentData) window.equipmentData = [];
                if (window.CACHE_GARAGENS) window.CACHE_GARAGENS = [];
                if (window.WifiMaxxApp && window.WifiMaxxApp.currentData) window.WifiMaxxApp.currentData = [];
                
                // Marcar cache como inválido para forçar recarregamento
                window.cacheInvalidated = true;
                window.lastCacheClear = Date.now();
                sessionStorage.setItem('cacheClearTimestamp', Date.now().toString());
                
                // Chamar endpoint do servidor para limpeza completa
                const cacheResponse = await fetch('/api/clear-user-cache', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (cacheResponse.ok) {
                    const cacheResult = await cacheResponse.json();
                    console.log('🗑️ Cache limpo:', cacheResult.message);
                    
                    // 🔄 Se o servidor indicar reload necessário, forçar limpeza adicional
                    if (cacheResult.reload_required) {
                        console.log('🔄 Servidor solicitou reload completo - limpando cache adicional');
                        
                        // 🧹 Limpeza adicional forçada de variáveis globais
                        ['currentData', 'filteredData', 'equipmentData', '__GRID_ROWS__', 'CACHE_GARAGENS', 
                         'CACHE_TECNICOS', 'allData', 'originalData', 'dashboardData', 'preloadedData']
                        .forEach(varName => {
                            if (window[varName]) {
                                window[varName] = null;
                                delete window[varName];
                                console.log(`🧹 Variável global ${varName} limpa`);
                            }
                        });
                        
                        // Marcar para reload forçado da página após login
                        window.forcePageReloadAfterLogin = true;
                        sessionStorage.setItem('forceReloadRequired', 'true');
                    }
                } else {
                    console.warn('⚠️ Erro ao limpar cache do servidor');
                }
                
                console.log('🗑️ Limpeza completa de cache realizada com invalidação forçada');
            } catch (error) {
                console.warn('⚠️ Erro durante limpeza de cache:', error);
                // Não lance erro para não interromper o login
            }
        }
        
        function showAlert(message, type) {
            // Remove alertas existentes
            const existingAlert = document.querySelector('.alert');
            if (existingAlert) {
                existingAlert.remove();
            }
            
            // Criar novo alerta
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            alertDiv.style.cssText = 'top: 20px; right: 20px; z-index: 9999; max-width: 400px;';
            alertDiv.innerHTML = `
                <i class="bi bi-${getAlertIcon(type)} me-2"></i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(alertDiv);
            
            // Auto-hide após 5 segundos
            setTimeout(() => {
                if (alertDiv && alertDiv.parentNode) {
                    alertDiv.remove();
                }
            }, 5000);
        }
        
        function getAlertIcon(type) {
            const icons = {
                'success': 'check-circle-fill',
                'danger': 'exclamation-triangle-fill',
                'warning': 'exclamation-triangle-fill',
                'info': 'info-circle-fill'
            };
            return icons[type] || 'info-circle-fill';
        }
        
        // =====================================================
        // Detecção de Dispositivo Móvel - Botão de Download
        // =====================================================
        function isAndroidDevice() {
            return /Android/i.test(navigator.userAgent);
        }
        
        function showAppDownloadButton() {
            // Mostrar botão de download do app apenas em Android
            const button = document.getElementById('appDownloadButton');
            if (button && isAndroidDevice()) {
                button.style.display = 'block';
            }
        }
        
        // Verificar e mostrar botão ao carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            showAppDownloadButton();
            
            // Adicionar listener ao botão de download
            const downloadLink = document.getElementById('downloadAppLink');
            if (downloadLink) {
                downloadLink.addEventListener('click', function(e) {
                    console.log('📦 Download APK iniciado');
                    localStorage.setItem('appDownloaded', 'true');
                    // NÃO prevenir comportamento padrão - deixar o link funcionar
                });
            }
        });
        
        // Função mantida para compatibilidade
        function markAppDownloaded() {
            localStorage.setItem('appDownloaded', 'true');
        }
    </script>
</body>
</html>
